# /etc/security/limits.d/rcfg-sim.conf
# Raises nofile for the rcfgsim service user.
#
# The systemd unit (rcfg-sim@.service) already sets LimitNOFILE=200000,
# so this file only matters if an operator ever runs the binary
# interactively (e.g. `sudo -u rcfgsim /opt/rcfg-sim/bin/rcfg-sim …`).
# Kept in sync with the unit limit so behaviour is identical across entry
# points.

rcfgsim soft nofile 200000
rcfgsim hard nofile 200000
