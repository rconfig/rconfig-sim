# /etc/sysctl.d/99-rcfg-sim.conf
# Drop-in for Rocky 9 hosting rcfg-sim. Install via Makefile (`make install`)
# or manually; apply with `sudo sysctl --system`.
#
# Every setting exists because the default has been observed to bite at
# 50k-port, ~5k-concurrent-session load. Each line documents the failure
# mode it prevents.

# Max open fd's system-wide. rcfg-sim needs ~2500 listener fds per
# instance × 20 instances = 50k fds plus one per active SSH session.
# 2M gives ~40× headroom.
fs.file-max = 2000000

# Kernel queue of completed TCP handshakes waiting for accept(). Default
# of 4096 is overwhelmed when rConfig starts a polling cycle and opens
# hundreds of connections at once.
net.core.somaxconn = 65535

# Half-open SYN backlog. Same rationale — raise to keep pace with
# polling-burst concurrency.
net.ipv4.tcp_max_syn_backlog = 65535

# Ephemeral port range. rcfg-sim binds 10000..12499 per IP; keep the
# low end below the bound ports and the high end as wide as possible
# so outbound connections (metrics scrapes, etc.) have room.
net.ipv4.ip_local_port_range = 1024 65535

# Fast reuse of TIME_WAIT sockets for outbound flows. Safe here — rcfg-sim
# primarily accepts, but the metrics scraper and diagnostic SSH clients
# open enough outbound flows to exhaust the TW bucket under load.
net.ipv4.tcp_tw_reuse = 1

# Per-CPU input packet queue for NAPI. Default 1000 drops packets during
# accept storms that saturate a single core's softirq loop.
net.core.netdev_max_backlog = 16384

# ARP table thresholds. 20 IP aliases plus peers plus transient host-based
# routes easily overrun the default gc_thresh2 (2048). Symptom when too
# low: intermittent "no route to host" that clears on retry.
net.ipv4.neigh.default.gc_thresh1 = 8192
net.ipv4.neigh.default.gc_thresh2 = 32768
net.ipv4.neigh.default.gc_thresh3 = 65536
